name: Deploy to Plesk

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      upload_node_modules:
        description: 'Force upload server node_modules (ช้า — ใช้เมื่อ deps เปลี่ยนหรือ server ขาดไฟล์)'
        type: boolean
        default: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect dependency changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            deps:
              - 'package.json'
              - 'package-lock.json'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (with duplicate-import guard)
        run: npm run test:build
        env:
          NODE_ENV: production
          NUXT_PUBLIC_SUPABASE_URL: ${{ secrets.NUXT_PUBLIC_SUPABASE_URL }}
          NUXT_PUBLIC_SUPABASE_KEY: ${{ secrets.NUXT_PUBLIC_SUPABASE_KEY }}

      - name: Prepare deploy bundle
        run: |
          mkdir -p deploy/.output
          cp -r .output/* deploy/.output/
          cp plesk/app.cjs plesk/ping.cjs package.json .node-version .nvmrc deploy/.output/

      - name: Verify server dependencies in bundle
        run: |
          test -d deploy/.output/server/node_modules/@supabase/supabase-js
          echo "server node_modules files: $(find deploy/.output/server/node_modules -type f | wc -l)"

      - name: Pack server deps (manual fallback zip)
        run: |
          cd deploy/.output/server
          zip -r -q ../../../server-node_modules.zip node_modules

      - name: Upload deps zip (download จาก Actions ถ้า SFTP ไม่ครบ)
        uses: actions/upload-artifact@v4
        with:
          name: server-node_modules
          path: server-node_modules.zip
          retention-days: 7

      - name: Deploy app to Plesk (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: deploy/
          server-dir: httpdocs/
          timeout: 600000
          log-level: minimal
          security: loose
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**

      - name: Deploy server node_modules (FTPS)
        if: steps.changes.outputs.deps == 'true' || inputs.upload_node_modules == true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: deploy/.output/server/node_modules/
          server-dir: httpdocs/.output/server/node_modules/
          timeout: 600000
          log-level: verbose
          security: loose
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
